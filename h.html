<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>жјўе­— Kanji Explorer</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Cinzel+Decorative:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Floating particles background -->
  <div class="particles" id="particles"></div>

  <header>
    <div class="header-inner">
      <div class="title-jp">жјўе­—</div>
      <h1>Kanji Explorer</h1>
      <p class="subtitle">Discover the Art of Japanese Characters</p>
    </div>
  </header>

  <main>
    <section class="search-section">
      <input type="text" id="searchInput" placeholder="Search kanji or meaning..." oninput="filterKanji()" />
    </section>

    <section class="table-section">
      <table id="kanjiTable">
        <thead>
          <tr>
            <th>#</th>
            <th>жјўе­— Kanji</th>
            <th>Reading (Romaji)</th>
            <th>Meaning</th>
            <th>Stroke Order</th>
          </tr>
        </thead>
        <tbody id="kanjiBody">
          <!-- Rows injected by JS -->
        </tbody>
      </table>
    </section>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModalDirect()">вњ•</button>
      <div id="modal-kanji" class="modal-kanji"></div>
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-meaning" class="modal-meaning"></div>
      <div class="stroke-label">Stroke Order Steps</div>
      <div id="stroke-steps" class="stroke-steps"></div>
      <p class="stroke-note">Each step progressively reveals the strokes of this character.</p>
    </div>
  </div>

  <footer>
    <p>в›©пёЏ Made with care for Japanese language learners &nbsp;|&nbsp; жјўе­— Explorer</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
